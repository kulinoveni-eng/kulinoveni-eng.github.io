<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Gallery 🔥</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#000;
color:white;
text-align:center;
}

.hero{
padding:20px;
background:linear-gradient(to bottom,#1a0010,#000);
}

.badge{
display:inline-block;
background:#ff1f5a;
padding:10px 20px;
border-radius:30px;
font-weight:bold;
font-size:18px;
box-shadow:0 0 20px #ff1f5a;
}

h1{
font-size:60px;
margin:20px 0 10px;
}

.subtitle{
font-size:22px;
color:#ccc;
}

.online{
color:#00ff88;
font-size:28px;
margin-top:15px;
font-weight:bold;
}

.timer{
font-size:26px;
color:#ffd700;
margin-top:15px;
font-weight:bold;
}

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}

.card{
position:relative;
overflow:hidden;
border-radius:20px;
}

.card img{
width:100%;
height:320px;
object-fit:cover;
filter:blur(6px);
}

.lock{
position:absolute;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.8);
padding:8px 14px;
border-radius:20px;
font-size:18px;
}

.cta{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:85%;
background:#ff1f5a;
padding:22px;
border-radius:40px;
font-size:34px;
font-weight:bold;
color:white;
text-decoration:none;
box-shadow:0 0 30px #ff1f5a;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:translateX(-50%) scale(1);}
50%{transform:translateX(-50%) scale(1.05);}
100%{transform:translateX(-50%) scale(1);}
}

.fakepopup{
position:fixed;
top:15px;
right:15px;
background:#111;
padding:12px 18px;
border-radius:15px;
font-size:16px;
box-shadow:0 0 15px #00ff88;
}
</style>
</head>

<body>

<div class="fakepopup">🔥 Jessica unlocked VIP access</div>

<div class="hero">
<div class="badge">🔥 LIMITED VIP ACCESS</div>
<h1>VIP Gallery</h1>
<div class="subtitle">Private exclusive content • Updated daily</div>
<div class="online">● 10,284 users online now</div>
<div class="timer">Offer ends in <span id="countdown">04:59</span></div>
</div>

<div class="gallery">
<div class="card"><img src="img1.jpg"><div class="lock">🔒 VIP</div></div>
<div class="card"><img src="img2.jpg"><div class="lock">🔒 VIP</div></div>
<div class="card"><img src="img3.jpg"><div class="lock">🔒 VIP</div></div>
<div class="card"><img src="img4.jpg"><div class="lock">🔒 VIP</div></div>
<div class="card"><img src="img5.jpg"><div class="lock">🔒 VIP</div></div>
<div class="card"><img src="img6.jpg"><div class="lock">🔒 VIP</div></div>
</div>

<a href="#" class="cta">UNLOCK VIP NOW 🔓</a>

<script>
(function(s){
s.dataset.zone='10988149';
s.src='https://al5sm.com/tag.min.js';
})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));

let time = 299;
setInterval(()=>{
let min = Math.floor(time/60);
let sec = time%60;
document.getElementById("countdown").innerHTML =
String(min).padStart(2,'0') + ":" + String(sec).padStart(2,'0');
if(time>0) time--;
},1000);
</script>

</body>
</html>
